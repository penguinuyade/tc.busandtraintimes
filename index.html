<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バス・電車 時刻表案内</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ticker-container">
        <div class="ticker-text">⚠️ 遅延については考慮されていません。ご了承ください。 ⚠️ 遅延については考慮されていません。ご了承ください。</div>
    </div>

    <header>
        <h1>時刻表案内</h1>
    </header>

    <main>
        <section class="info-section bus-theme">
            <div class="section-header">
                <h2 id="bus-section-title">🚌 次のバス</h2>
                <select id="bus-type-select" class="inline-select bus-select">
                    <option value="city">市営バス</option>
                    <option value="shuttle">シャトルバス (1〜3号車)</option>
                </select>
            </div>

            <div id="shuttle-reservation" class="reservation-box" style="display: none;">
                <a href="https://shuttlebus.kutc.kansai-u.ac.jp/" target="_blank" rel="noopener noreferrer" class="reserve-btn">📅 シャトルバス予約サイトへ</a>
            </div>

            <div id="boarded-bus-container" class="boarded-container" style="display: none;">
                <div class="boarded-title">✅ 現在乗車予定のバス (タップで取消)</div>
                <ul id="boarded-bus-list" class="time-list"></ul>
            </div>

            <ul id="bus-list" class="time-list">
                <li class="list-item">読み込み中...</li>
            </ul>
            <p style="font-size: 0.75rem; color: #94a3b8; text-align: center; margin-top: 10px;">※バスをタップして乗車予定に設定できます</p>
        </section>

        <section class="info-section train-theme">
            <div class="section-header">
                <h2 id="train-section-title">🚆 次の電車</h2>
                <div class="train-controls">
                    <select id="train-line-select" class="inline-select train-select">
                        <option value="jr">JR線</option>
                        <option value="hankyu">阪急線</option>
                    </select>
                    <select id="train-dir-select" class="inline-select train-select">
                        <option value="osaka">大阪方面 (姫路・西明石)</option>
                        <option value="kyoto">京都方面 (京都・米原)</option>
                    </select>
                </div>
            </div>
            
            <p id="train-notice" class="notice-text"></p>
            <ul id="train-list" class="time-list">
                <li class="list-item">読み込み中...</li>
            </ul>
        </section>
    </main>

    <div id="confirm-modal" class="modal" style="display: none;">
        <div class="modal-content" style="text-align: center;">
            <h3 id="confirm-msg" style="margin-bottom: 15px; color: #e2e8f0;">このバスに乗車しますか？</h3>
            <div id="confirm-bus-info" class="confirm-info-box"></div>
            <div style="display: flex; gap: 10px;">
                <button id="confirm-yes" class="primary-btn">はい</button>
                <button id="confirm-no" class="primary-btn btn-cancel">いいえ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
